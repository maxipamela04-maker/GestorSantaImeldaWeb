
<style>
#erd { padding: 1rem 0; }
#erd svg { max-width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e3a5f' : '#E6F1FB',
    primaryTextColor: dark ? '#B5D4F4' : '#0C447C',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    secondaryColor: dark ? '#0d3326' : '#E1F5EE',
    secondaryTextColor: dark ? '#9FE1CB' : '#085041',
    secondaryBorderColor: dark ? '#1D9E75' : '#0F6E56',
    tertiaryColor: dark ? '#2d1a0e' : '#FAEEDA',
    tertiaryTextColor: dark ? '#FAC775' : '#633806',
    tertiaryBorderColor: dark ? '#BA7517' : '#854F0B',
  },
});

const diagram = `erDiagram
  Clinica {
    int idClinica PK
    string nombre
    string direccion
  }
  Usuario {
    int usuario_id PK
    string nombres
    string apellidos
    string email
    string password
    string rol
    string telefono
    date fecha_contratacion
    boolean activo
    int idClinica FK
  }
  Empleado {
    int empleado_id PK
    string puesto
    string departamento
    date fecha_ingreso
    int dias_vacaciones_lft
    int dias_tomados
    int dias_disponibles
    int usuario_id FK
  }
  Solicitud {
    int solicitud_id PK
    date fecha_inicio
    date fecha_fin
    date fecha_creacion
    int dias_solicitados
    string motivo
    string estado
    date fecha_revision
    string observaciones_autorizador
    int usuario_id FK
  }
  HistorialVacaciones {
    int historial_id PK
    int anio_correspondiente
    int dias_ganados
    int dias_tomados
    int dias_disponibles
    date ultima_actualizacion
    int usuario_id FK
  }

  Clinica ||--o{ Usuario : "Pertenecer (1:N)"
  Usuario ||--|| Empleado : "Tener (1:1)"
  Usuario ||--o{ Solicitud : "Realizar (1:N)"
  Usuario ||--o{ HistorialVacaciones : "Tener (1:N)"
  Solicitud ||--o{ HistorialVacaciones : "Generar (1:N)"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
